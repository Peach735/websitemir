<!DOCTYPE html>
<!-- @dsCard group="UI Kit — Landing Bridge" name="Лендинг МИРАСА — мост на рынок" subtitle="Сторителлинг-схема, метафора «мост», 2 варианта героя" -->
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>МИРАСА — мост на рынки Беларуси и России</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="stylesheet" href="bridge.css">

  <!-- Resources referenced as strings inside JSX — lifted so the standalone bundler can inline them -->
  <meta name="ext-resource-dependency" content="../../assets/logomark.png" data-resource-id="logomark" />
  <meta name="ext-resource-dependency" content="../../assets/photos/hero-production.jpg" data-resource-id="heroProduction" />
  <meta name="ext-resource-dependency" content="../../assets/photos/hero-logistics.jpg" data-resource-id="heroLogistics" />
  <meta name="ext-resource-dependency" content="../../assets/photos/svc-analytics.jpg" data-resource-id="svcAnalytics" />
  <meta name="ext-resource-dependency" content="../../assets/photos/svc-negotiation.jpg" data-resource-id="svcNegotiation" />
  <meta name="ext-resource-dependency" content="../../assets/photos/svc-quality.jpg" data-resource-id="svcQuality" />
  <meta name="ext-resource-dependency" content="../../assets/photos/svc-finance.jpg" data-resource-id="svcFinance" />
  <script>
    /* Fallback: when served normally (not bundled), resolve each resource id
       to its original path. The bundler injects its own window.__resources
       (blob URLs) before this runs, so bundled values are preserved. */
    window.__resources = window.__resources || {};
    document.querySelectorAll('meta[name="ext-resource-dependency"]').forEach(function (m) {
      var id = m.getAttribute('data-resource-id');
      if (id && !window.__resources[id]) window.__resources[id] = m.getAttribute('content');
    });
  </script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="#1A237E"/>
      <text x="50" y="62" font-family="sans-serif" font-size="40" font-weight="800" fill="#fff" text-anchor="middle">М</text>
    </svg>
  </template>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="parts-top.jsx"></script>
  <script type="text/babel" src="parts-mid.jsx"></script>
  <script type="text/babel" src="parts-bottom.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
