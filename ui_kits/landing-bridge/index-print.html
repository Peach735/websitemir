<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>МИРАСА — мост на рынки Беларуси и России</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="stylesheet" href="bridge.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    /* Force the desktop (two-column) layout on the print canvas instead of
       the <980px mobile breakpoint, so the hero split + grids look intentional. */
    @media print {
      @page { size: A4 portrait; margin: 12mm 0; }

      html, body { background: #fff !important; }
      *, *::before, *::after {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      /* freeze any entrance animations at their end state */
      *, *::before, *::after {
        animation-delay: -99s !important; animation-duration: .001s !important;
        animation-iteration-count: 1 !important; animation-fill-mode: both !important;
        animation-play-state: running !important; transition-duration: 0s !important;
      }

      /* header should not stick / repeat on every page */
      .header { position: static !important; box-shadow: none !important; backdrop-filter: none !important; background: #fff !important; }

      /* tighten the rhythm a little for paper */
      .page { --sec-pad: 56px !important; --row-gap: 40px !important; }
      .hero { padding-top: 40px !important; }

      /* keep cohesive blocks intact across page breaks */
      .section-head, .svcrow, .expect, .fmt, .value, .proc, .pain,
      .bridge, .bridge__node, .crow, .metric, .cycle__card,
      .hero__card, .hero__aside, .ctaband__inner, .purpose__text {
        break-inside: avoid;
      }
      .ctaband, .purpose, .contacts, .footer { break-inside: avoid; }

      /* placeholders read fine on paper; soften the stripe a touch */
      .ph { min-height: 200px !important; }
    }

    /* On-screen (the print tab preview) show the desktop layout regardless of width */
    body { background: #fff; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="parts-top.jsx"></script>
  <script type="text/babel" src="parts-mid.jsx"></script>
  <script type="text/babel" src="parts-bottom.jsx"></script>
  <script type="text/babel" src="app-print.jsx"></script>
</body>
</html>
