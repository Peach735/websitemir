<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .sw { display:flex; flex-direction:column; gap:8px; }
  .chip { width:118px; height:72px; border-radius:8px; border:1px solid rgba(0,0,0,0.06); }
  .nm { font-size:13px; font-weight:700; color:var(--fg1); }
  .hx { font-size:12px; font-weight:500; color:var(--fg2); }
  .use { font-size:11px; color:var(--fg3); }
</style></head>
<body>
  <p class="card-label">Brand · Primary navy</p>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#1A237E"></div><span class="nm">navy-900</span><span class="hx mono">#1A237E</span><span class="use">Wordmark · ink</span></div>
    <div class="sw"><div class="chip" style="background:#1E3A8A"></div><span class="nm">navy-800</span><span class="hx mono">#1E3A8A</span><span class="use">Actions · links</span></div>
    <div class="sw"><div class="chip" style="background:#2547B0"></div><span class="nm">navy-700</span><span class="hx mono">#2547B0</span><span class="use">Hover</span></div>
    <div class="sw"><div class="chip" style="background:#2E5BD8"></div><span class="nm">navy-600</span><span class="hx mono">#2E5BD8</span><span class="use">Accent (rare)</span></div>
    <div class="sw"><div class="chip" style="background:#EEF2FB"></div><span class="nm">navy-050</span><span class="hx mono">#EEF2FB</span><span class="use">Tinted surface</span></div>
  </div>
</body></html>
