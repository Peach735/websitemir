<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body{padding:26px;}
  .btn{display:inline-flex;align-items:center;gap:9px;font-family:var(--font-sans);font-weight:700;font-size:16px;border-radius:5px;padding:13px 22px;cursor:pointer;border:1px solid transparent;transition:all .16s ease;}
  .btn-primary{background:var(--action);color:#fff;}
  .btn-primary:hover{background:var(--action-hover);}
  .btn-secondary{background:#fff;color:var(--action);border-color:var(--line-300);}
  .btn-ghost{background:transparent;color:var(--action);padding-left:6px;padding-right:6px;}
  .btn svg{width:18px;height:18px;}
  .meta{font-size:11px;color:var(--fg3);font-weight:600;margin-top:14px;}
</style></head>
<body>
  <p class="card-label">Buttons · CTA «Позвонить»</p>
  <div class="row" style="align-items:center;">
    <button class="btn btn-primary"><i data-lucide="phone"></i>Позвонить</button>
    <button class="btn btn-secondary">Подробнее</button>
    <button class="btn btn-ghost">Узнать больше<i data-lucide="arrow-right"></i></button>
  </div>
  <p class="meta">Primary navy · darken on hover · 5px radius · Manrope 700</p>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
</body></html>
