<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .sw { display:flex; flex-direction:column; gap:8px; }
  .chip { width:150px; height:72px; border-radius:8px; border:1px solid #D8DEE8; }
  .nm { font-size:13px; font-weight:700; color:var(--fg1); }
  .hx { font-size:12px; font-weight:500; color:var(--fg2); }
  .use { font-size:11px; color:var(--fg3); }
</style></head>
<body>
  <p class="card-label">Surfaces</p>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#FFFFFF"></div><span class="nm">surface-0</span><span class="hx mono">#FFFFFF</span><span class="use">Base / cards</span></div>
    <div class="sw"><div class="chip" style="background:#F5F7FA"></div><span class="nm">surface-1</span><span class="hx mono">#F5F7FA</span><span class="use">Page tint</span></div>
    <div class="sw"><div class="chip" style="background:#EEF1F6"></div><span class="nm">surface-2</span><span class="hx mono">#EEF1F6</span><span class="use">Section tint</span></div>
  </div>
</body></html>
