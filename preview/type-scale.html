<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  table{border-collapse:collapse;width:100%;}
  td{padding:7px 10px;border-bottom:1px solid var(--line-200);vertical-align:baseline;}
  .tok{font-size:12px;font-weight:700;color:var(--action);width:90px;}
  .px{font-size:11px;color:var(--fg3);width:54px;font-variant-numeric:tabular-nums;}
  .spec{color:var(--fg1);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
</style></head>
<body>
  <p class="card-label">Type scale</p>
  <table>
    <tr><td class="tok">5xl</td><td class="px">76</td><td class="spec" style="font-size:30px">Аа Бб Вв</td></tr>
    <tr><td class="tok">4xl</td><td class="px">60</td><td class="spec" style="font-size:26px">Аа Бб Вв</td></tr>
    <tr><td class="tok">3xl</td><td class="px">44</td><td class="spec" style="font-size:22px">Аа Бб Вв</td></tr>
    <tr><td class="tok">2xl</td><td class="px">32</td><td class="spec" style="font-size:18px">Аа Бб Вв</td></tr>
    <tr><td class="tok">xl</td><td class="px">24</td><td class="spec" style="font-size:16px">Аа Бб Вв</td></tr>
    <tr><td class="tok">base</td><td class="px">17</td><td class="spec" style="font-size:14px;font-weight:500">Аа Бб Вв Гг Дд</td></tr>
  </table>
</body></html>
