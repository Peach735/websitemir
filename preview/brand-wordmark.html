<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body{padding:0;}
  .wrap{display:flex;flex-direction:column;gap:18px;padding:28px 30px;}
  .lockup{display:flex;flex-direction:column;gap:6px;}
  .word{font-size:38px;font-weight:800;letter-spacing:0.04em;color:var(--navy-900);line-height:1;}
  .bar{height:3px;width:44px;background:var(--navy-800);border-radius:2px;}
  .tag{font-size:11px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;color:var(--ink-500);}
  .ondark{background:var(--navy-900);padding:16px 26px;border-radius:8px;display:inline-flex;align-items:center;}
  .word-w{font-size:30px;font-weight:800;letter-spacing:0.04em;color:#fff;line-height:1;}
</style></head>
<body>
  <p class="card-label" style="padding:22px 30px 0;margin:0;">Logomark · рукопожатие «М»</p>
  <div class="wrap" style="flex-direction:row;align-items:center;gap:22px;">
    <img src="../assets/logo.svg" alt="МИРАСА" style="height:78px;">
    <div class="ondark"><img src="../assets/logo.svg" alt="МИРАСА" style="height:60px;filter:brightness(0) invert(1);"></div>
  </div>
</body></html>
