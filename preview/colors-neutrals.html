<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .sw { display:flex; flex-direction:column; gap:8px; }
  .chip { width:96px; height:72px; border-radius:8px; border:1px solid rgba(0,0,0,0.06); }
  .nm { font-size:13px; font-weight:700; color:var(--fg1); }
  .hx { font-size:12px; font-weight:500; color:var(--fg2); }
</style></head>
<body>
  <p class="card-label">Neutrals · Text & lines</p>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#1E2530"></div><span class="nm">ink-900</span><span class="hx mono">#1E2530</span></div>
    <div class="sw"><div class="chip" style="background:#3B4453"></div><span class="nm">ink-700</span><span class="hx mono">#3B4453</span></div>
    <div class="sw"><div class="chip" style="background:#5B6473"></div><span class="nm">ink-500</span><span class="hx mono">#5B6473</span></div>
    <div class="sw"><div class="chip" style="background:#8A93A3"></div><span class="nm">ink-400</span><span class="hx mono">#8A93A3</span></div>
    <div class="sw"><div class="chip" style="background:#D8DEE8"></div><span class="nm">line-300</span><span class="hx mono">#D8DEE8</span></div>
    <div class="sw"><div class="chip" style="background:#E6EBF2"></div><span class="nm">line-200</span><span class="hx mono">#E6EBF2</span></div>
  </div>
</body></html>
