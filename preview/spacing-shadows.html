<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body{background:#FBFCFE;}
  .sw{display:flex;flex-direction:column;gap:12px;align-items:center;}
  .box{width:150px;height:70px;background:#fff;border-radius:8px;}
  .nm{font-size:12px;font-weight:700;color:var(--fg1);}
</style></head>
<body>
  <p class="card-label">Shadows · navy-tinted, delicate</p>
  <div class="row" style="gap:24px;padding:6px 0 18px;">
    <div class="sw"><div class="box" style="box-shadow:0 1px 2px rgba(26,35,126,0.05);border:1px solid var(--line-200)"></div><span class="nm">shadow-sm</span></div>
    <div class="sw"><div class="box" style="box-shadow:0 4px 16px rgba(26,35,126,0.07)"></div><span class="nm">shadow-md</span></div>
    <div class="sw"><div class="box" style="box-shadow:0 12px 36px rgba(26,35,126,0.10)"></div><span class="nm">shadow-lg</span></div>
  </div>
</body></html>
