<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .scale{display:flex;flex-direction:column;gap:9px;}
  .item{display:flex;align-items:center;gap:12px;}
  .bar{height:14px;background:var(--navy-800);border-radius:2px;}
  .lbl{font-size:11px;font-weight:700;color:var(--fg2);width:64px;font-variant-numeric:tabular-nums;}
</style></head>
<body>
  <p class="card-label">Spacing · 8pt base</p>
  <div class="scale">
    <div class="item"><span class="lbl">2 · 8</span><div class="bar" style="width:8px"></div></div>
    <div class="item"><span class="lbl">4 · 16</span><div class="bar" style="width:16px"></div></div>
    <div class="item"><span class="lbl">5 · 24</span><div class="bar" style="width:24px"></div></div>
    <div class="item"><span class="lbl">6 · 32</span><div class="bar" style="width:32px"></div></div>
    <div class="item"><span class="lbl">7 · 48</span><div class="bar" style="width:48px"></div></div>
    <div class="item"><span class="lbl">8 · 64</span><div class="bar" style="width:64px"></div></div>
    <div class="item"><span class="lbl">9 · 96</span><div class="bar" style="width:96px"></div></div>
  </div>
</body></html>
