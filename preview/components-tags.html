<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body{padding:24px 26px;}
  .tags{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:18px;}
  .tag{font-size:13px;font-weight:600;color:var(--ink-700);background:#fff;border:1px solid var(--line-300);border-radius:5px;padding:8px 13px;}
  .vals{display:flex;gap:8px;flex-wrap:wrap;}
  .val{font-size:13px;font-weight:700;color:var(--action);background:var(--navy-050);border-radius:999px;padding:7px 15px;}
</style></head>
<body>
  <p class="card-label">Industry tags · value chips</p>
  <div class="tags">
    <span class="tag">Машиностроение</span>
    <span class="tag">Автомобилестроение</span>
    <span class="tag">Металлургия</span>
    <span class="tag">Металлоконструкции</span>
  </div>
  <div class="vals">
    <span class="val">Конфиденциальность</span>
    <span class="val">Профессионализм</span>
    <span class="val">Независимость</span>
  </div>
</body></html>
