<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .sw{display:flex;flex-direction:column;gap:8px;align-items:flex-start;}
  .box{width:96px;height:64px;background:var(--navy-050);border:1px solid var(--navy-800);}
  .nm{font-size:12px;font-weight:700;color:var(--fg1);}
  .vl{font-size:11px;color:var(--fg3);}
</style></head>
<body>
  <p class="card-label">Corner radii · minimal</p>
  <div class="row">
    <div class="sw"><div class="box" style="border-radius:4px"></div><span class="nm">sm · 4px</span><span class="vl">Buttons · inputs</span></div>
    <div class="sw"><div class="box" style="border-radius:6px"></div><span class="nm">md · 6px</span><span class="vl">Cards</span></div>
    <div class="sw"><div class="box" style="border-radius:10px"></div><span class="nm">lg · 10px</span><span class="vl">Panels</span></div>
    <div class="sw"><div class="box" style="border-radius:999px;width:64px"></div><span class="nm">pill</span><span class="vl">Chips</span></div>
  </div>
</body></html>
