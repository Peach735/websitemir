<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body{padding:24px 26px;}
  .rows{display:flex;flex-direction:column;gap:12px;max-width:520px;}
  .crow{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid var(--line-200);border-radius:8px;background:#fff;}
  .ic{width:38px;height:38px;border-radius:7px;background:var(--navy-050);display:flex;align-items:center;justify-content:center;color:var(--action);}
  .ic svg{width:20px;height:20px;}
  .k{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--fg3);}
  .v{font-size:18px;font-weight:700;color:var(--fg1);}
</style></head>
<body>
  <p class="card-label">Contact row</p>
  <div class="rows">
    <div class="crow"><span class="ic"><i data-lucide="phone"></i></span><div class="col"><span class="k">Телефон</span><span class="v">[ТЕЛЕФОН]</span></div></div>
    <div class="crow"><span class="ic"><i data-lucide="mail"></i></span><div class="col"><span class="k">Email</span><span class="v">[EMAIL]</span></div></div>
  </div>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
</body></html>
